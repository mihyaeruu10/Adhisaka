<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>First Impression - Gallery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Gallery-specific styles */
        .gallery-page {
            min-height: 100vh;
            background: var(--bg-primary);
            padding: 100px 20px 80px;
        }

        .gallery-header {
            max-width: 800px;
            margin: 0 auto 80px;
            text-align: center;
        }

        .gallery-header h1 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 16px;
            line-height: 1.2;
        }

        .gallery-subtitle {
            font-size: 1.1rem;
            color: var(--text-muted);
            font-style: italic;
            opacity: 0.8;
        }

        .gallery-grid {
            max-width: 800px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
        }

        .gallery-card {
            position: relative;
            aspect-ratio: 3/4;
            border-radius: var(--border-radius-lg);
            overflow: hidden;
            cursor: pointer;
            transition: all var(--transition-medium);
            border: 1px solid var(--border-color);
            background: var(--bg-card);
        }

        .gallery-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-xl);
            border-color: var(--border-color-hover);
        }

        .gallery-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform var(--transition-slow);
        }

        .gallery-card:hover .gallery-image {
            transform: scale(1.05);
        }

        .gallery-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(9, 9, 14, 0.95) 0%, rgba(9, 9, 14, 0.3) 50%, transparent 100%);
            display: flex;
            align-items: flex-end;
            padding: 32px;
            opacity: 1;
            transition: all var(--transition-medium);
        }

        .gallery-card:hover .gallery-overlay {
            background: linear-gradient(to top, rgba(9, 9, 14, 0.85) 0%, rgba(9, 9, 14, 0.2) 50%, transparent 100%);
        }

        .gallery-info h3 {
            font-size: 1.4rem;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .gallery-hint {
            font-size: 0.85rem;
            color: var(--accent);
            opacity: 0.7;
            transition: all var(--transition-fast);
        }

        .gallery-card:hover .gallery-hint {
            opacity: 1;
            transform: translateX(4px);
        }

        @media (max-width: 768px) {
            .gallery-page {
                padding: 80px 20px 60px;
            }

            .gallery-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 16px;
            }

            .gallery-card {
                aspect-ratio: 4/5;
            }
        }
    </style>
</head>

<body>
    <!-- Close/Back Button -->
    <div class="first-impression-close">
        <a href="saka.html" class="close-btn">← Kembali</a>
    </div>

    <!-- Gallery Content -->
    <div class="gallery-page">
        <header class="gallery-header animate-on-scroll">
            <h1>Kesan Pertama</h1>
            <p class="gallery-subtitle">Dalam sudut pandang mereka yang kenal</p>
        </header>

        <div class="gallery-grid">
            <!-- Person 1 -->
            <a href="first-impression.html?person=1" class="gallery-card animate-on-scroll">
                <img src="assets/Ian.jpeg" alt="Portrait" class="gallery-image">
                <div class="gallery-overlay">
                    <div class="gallery-info">
                        <h3>Gwenneth</h3>
                        <p class="gallery-hint">Baca cerita →</p>
                    </div>
                </div>
            </a>

            <!-- Person 2 -->
            <a href="first-impression.html?person=2" class="gallery-card animate-on-scroll">
                <img src="assets/Jiwoo.jpeg" alt="Portrait" class="gallery-image">
                <div class="gallery-overlay">
                    <div class="gallery-info">
                        <h3>Cheyrish</h3>
                        <p class="gallery-hint">Baca cerita →</p>
                    </div>
                </div>
            </a>

            <!-- Person 3 -->
            <a href="first-impression.html?person=3" class="gallery-card animate-on-scroll">
                <img src="assets/Keonho.jpeg" alt="Portrait" class="gallery-image">
                <div class="gallery-overlay">
                    <div class="gallery-info">
                        <h3>Selatan</h3>
                        <p class="gallery-hint">Baca cerita →</p>
                    </div>
                </div>
            </a>

            <!-- Person 4 -->
            <a href="first-impression.html?person=4" class="gallery-card animate-on-scroll">
                <img src="assets/Juhoon.jpeg" alt="Portrait" class="gallery-image">
                <div class="gallery-overlay">
                    <div class="gallery-info">
                        <h3>Reign</h3>
                        <p class="gallery-hint">siganteng →</p>
                    </div>
                </div>
            </a>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
